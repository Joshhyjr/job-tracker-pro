# CI keeps everyday code quality checks close to the pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Install, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Trusted first-party actions use Node 24-compatible major versions.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        # Keep browser, build-config, and Vercel Function boundaries type-safe.
        run: npx tsc -p tsconfig.app.json --noEmit && npx tsc -p tsconfig.node.json --noEmit && npx tsc -p tsconfig.api.json --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
